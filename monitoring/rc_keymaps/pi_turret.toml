# pi-turret IR keytable (NEC) — deployed to /etc/rc_keymaps/pi_turret.toml
#
# Maps this 21-key NEC remote's scancodes -> evdev KEY_* names. The supervisor
# (app/remote_supervisor.py) then maps KEY_* -> intent via RemoteConfig (config.py).
#
# DIGIT scancodes are verified for this clone; the transport-key labels (|<< >>| >||)
# can differ per print run. VERIFY on the actual unit before trusting:
#   sudo ir-keytable -s rcN -c -p nec -t   # press each button, note `scancode = 0x..`
# then fix any mismatch below and reload:  sudo systemctl restart pi-turret-ir
#
# KEY_* here MUST match the key_* defaults in config.py::RemoteConfig.

[[protocols]]
name = "pi_turret"
protocol = "nec"
variant = "nec"

[protocols.scancodes]
0x45 = "KEY_STOP"          # CH-  -> ESTOP (pump off + disarm)
0x47 = "KEY_CHANNELUP"     # CH+  -> ARM / DISARM toggle
0x46 = "KEY_HOMEPAGE"      # CH   -> HOME / center
0x09 = "KEY_MODE"          # EQ   -> toggle fire-enable (would-fire <-> live)
0x43 = "KEY_PLAYPAUSE"     # >||  -> FIRE
0x44 = "KEY_PREVIOUS"      # |<<  -> jog pan -
0x40 = "KEY_NEXT"          # >>|  -> jog pan +
0x15 = "KEY_VOLUMEUP"      # +    -> jog tilt up
0x07 = "KEY_VOLUMEDOWN"    # -    -> jog tilt down
0x16 = "KEY_NUMERIC_0"     # 0    -> POWER: systemctl start/stop turret.service
0x0c = "KEY_NUMERIC_1"     # 1    (spare — future strategy preset)
0x18 = "KEY_NUMERIC_2"     # 2    (spare)
0x5e = "KEY_NUMERIC_3"     # 3    (spare)
0x08 = "KEY_NUMERIC_4"     # 4    (spare)
0x1c = "KEY_NUMERIC_5"     # 5    (spare)
0x5a = "KEY_NUMERIC_6"     # 6    (spare)
0x42 = "KEY_NUMERIC_7"     # 7    (spare)
0x52 = "KEY_NUMERIC_8"     # 8    (spare)
0x4a = "KEY_NUMERIC_9"     # 9    -> SHUTDOWN: systemctl poweroff (ONLY when turret.service is stopped)
