# pi-turret v2 configuration. Values here override the dataclass defaults in
# config.py. Anything omitted falls back to the typed default. Units are in the
# key names (_px, _deg, _us, _s). See config.py for the full field list.

camera:
  detection_source: picamera2     # picamera2 (Pi Cam) | usb
  capture_width_px: 1152
  capture_height_px: 1152
  lores_format: YUV420            # Pi 4 lores must be YUV420
  fixed_focus: true
  lens_position: 4.0
  rotation_deg: 0                 # 0/90/180/270 — set if the module is mounted rotated
                                  # (FPC ribbon not at the bottom). Prefer a physical
                                  # remount; confirm orientation with a test capture.

stream:                           # USB-webcam live view via mjpg-streamer subprocess
  enabled: true
  device: /dev/video0             # the USB webcam (NOT the Pi Cam)
  width_px: 640
  height_px: 480
  fps: 15
  port: 8080
  # The bare name "mjpg_streamer" is not on PATH on the Pi; point at v1's committed
  # ARM build (deploys via git push). The .so plugins live in plugin_dir.
  binary: v1/mjpg-streamer/mjpg-streamer-experimental/_build/mjpg_streamer
  plugin_dir: v1/mjpg-streamer/mjpg-streamer-experimental
  input_plugin: input_uvc.so
  output_plugin: output_http.so
  www_dir: ""

detector:
  backend: coral_yolo             # coral_yolo | coral_mobiledet | cpu
  model_path: models/bird_yolov8n_256_int8_edgetpu_run1.tflite
  input_size_px: 256
  num_classes: 1
  conf_threshold: 0.25
  iou_threshold: 0.5
  coords_normalized: true         # golden-fixture pinned (run1 int8 tflite vs model.predict, Strix)

tracker:
  iou_match_threshold: 0.3
  max_age_frames: 30
  min_hits: 3
  velocity_smoothing: 0.5

predict:
  lead_time_s: 0.45               # measure servo travel + water ToF on the Pi
  fps: 20.0

strategy:
  w_killzone: 1.0
  w_size: 0.5
  w_dwell: 0.3
  w_approach: 0.7
  w_confidence: 0.4
  dwell_norm_frames: 20
  switch_hysteresis: 0.15
  min_target_dwell_frames: 5

killzone:
  shape: rect                     # rect | circle
  cx_px: 576.0
  cy_px: 576.0
  half_w_px: 120.0
  half_h_px: 120.0
  radius_px: 120.0

aim:
  # Default reproduces the v1 hand-tuned preset. Replace with a fitted transform
  # (aim/calibrate.fit_calibration) measured on the real rig.
  pan_coeffs: [-0.04, 0.0, 59.04]
  tilt_coeffs: [0.0, 0.06666666666666667, -10.4]
  parallax_pan_deg: 0.0
  drop_tilt_deg: 0.0

controller:
  kp: 0.02
  ki: 0.0
  deadband_px: 8.0
  max_step_deg: 6.0
  integral_limit_deg: 5.0
  backlash_takeup_deg: 1.0

servo:
  i2c_bus: 1
  i2c_address: 0x40
  pwm_freq_hz: 50
  pan_channel: 1
  tilt_channel: 0
  pan_min_deg: 5.0
  pan_max_deg: 47.0
  tilt_min_deg: 5.0
  tilt_max_deg: 25.0
  pulse_slope_us_per_deg: 11.11111111111111
  pulse_offset_us: 501.0
  pulse_min_us: 500.0
  pulse_max_us: 2500.0
  home_pan_deg: 26.0              # geometric mid-travel; recalibrate via Set Home + Save
  home_tilt_deg: 15.0

pump:
  pump_gpio_bcm: 26               # via relay/MOSFET + flyback diode, never bare GPIO
  aux_gpio_bcm: 24                # aux laser/marker — rewired to its own pin (was v1's BCM27)
  status_led_gpio_bcm: 23
  active_high: true

fire:
  enabled: false                  # SAFE default: would-fire telemetry only
  fire_duration_s: 1.0
  cooldown_s: 2.0
  aim_deadband_px: 12.0
  require_killzone: true

app:
  annotation_mode: off            # off | fire_frames_only | full_video
  snapshot_mode: off              # off | every | fire_only | sampled
  snapshot_sample_every: 30
  snapshot_dir: dataset
  detection_mode: full_frame      # full_frame | motion_gated
  stream_source: usb              # usb | picam_annotated
  web_port: 8001
  log_level: INFO
  detection_video_enabled: false  # debug: stream the detector's lores frame (JPEG) under the canvas
  detection_video_max_fps: 5.0    # server-side encode-rate cap (protects detection FPS)
  detection_video_quality: 70
  lcd_enabled: true               # 1602A on I2C bus 1 (rpi_lcd), shares bus with PCA9685
  lcd_refresh_hz: 4.0
  status_led_enabled: true        # BCM23
  aux_marker_enabled: false       # BCM24 aux laser as aim marker — OPT-IN (laser safety)

# IR remote — Step 1.15. Bare VS1838B on BCM25 (`dtoverlay=gpio-ir,gpio_pin=25`).
# The SUPERVISOR daemon (turret-remote.service) owns the device and either runs
# systemctl on the turret unit (POWER key) or forwards the key to the app's :8001 API.
# Ships off — set `remote.enabled: true` in config.local.yaml to activate on the Pi.
# KEY_* names must match /etc/rc_keymaps/pi_turret.toml (verified on this remote).
remote:
  enabled: false
  gpio_bcm: 25                    # owner-wired signal pin (dtoverlay gpio_pin=25)
  device_name: gpio_ir_recv       # match evdev device by NAME (eventN index drifts)
  input_device: ""               # optional explicit /dev/input/by-path/... (overrides name)
  grab: true                     # EVIOCGRAB so digits don't leak to a tty (headless)
  oneshot_ignore_autorepeat: true
  key_estop: KEY_STOP            # CH-  -> ESTOP
  key_toggle_arm: KEY_CHANNELUP  # CH+  -> arm/disarm
  key_enable_fire: KEY_MODE      # EQ   -> toggle fire-enable
  key_center: KEY_HOMEPAGE       # CH   -> HOME
  key_fire: KEY_PLAYPAUSE        # >||  -> FIRE
  key_power: KEY_NUMERIC_0       # 0    -> POWER: systemctl start/stop turret.service
  key_shutdown: KEY_NUMERIC_9    # 9    -> halt the whole Pi (ONLY when turret.service is stopped)
  key_pan_left: KEY_PREVIOUS     # |<<  -> jog pan -
  key_pan_right: KEY_NEXT        # >>|  -> jog pan +
  key_tilt_up: KEY_VOLUMEUP      # +    -> jog tilt up
  key_tilt_down: KEY_VOLUMEDOWN  # -    -> jog tilt down
  forward_host: "127.0.0.1"
  forward_port: 8001
  forward_timeout_s: 1.0
  turret_unit: turret.service
  lcd_status_enabled: true       # supervisor shows a STANDBY screen on the 1602 while the turret is OFF
  lcd_poll_s: 2.0                # re-check turret state / refresh the standby screen this often
  repeat_delay_ms: 150
  repeat_period_ms: 110
